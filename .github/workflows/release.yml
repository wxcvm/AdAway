name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v6.1.0 && git push origin v6.1.0
#
# Required repo secrets:
#   SIGNING_KEYSTORE_BASE64  – base64-encoded .jks keystore
#   SIGNING_STORE_PASSWORD   – keystore password
#   SIGNING_KEY_ALIAS        – key alias
#   SIGNING_KEY_PASSWORD     – key password

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/adaway-release.jks"

      - name: Write Gradle signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cat >> "$HOME/.gradle/gradle.properties" << PROPS
          signingStoreLocation=$HOME/adaway-release.jks
          signingStorePassword=$SIGNING_STORE_PASSWORD
          signingKeyAlias=$SIGNING_KEY_ALIAS
          signingKeyPassword=$SIGNING_KEY_PASSWORD
          PROPS

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee /tmp/gradle.log || {
            echo "=== GRADLE ERRORS ==="
            grep -E "^(e:|error:|FAILED|Exception|Cannot|Could not|Caused by)" /tmp/gradle.log | tail -60
            exit 1
          }

      - name: Rename APK to versioned filename
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "## APK search results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find app/build/outputs -name '*.apk' 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || echo "(none)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -la app/build/outputs/apk/release/ 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
          SRC=$(find app/build/outputs -name '*.apk' | head -n1)
          echo "Selected: $SRC" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$SRC" ]; then echo "No APK found!"; exit 1; fi
          DEST="app/build/outputs/apk/release/AdAway-${TAG}.apk"
          mkdir -p "$(dirname "$DEST")"
          cp "$SRC" "$DEST"
          echo "path=$DEST"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"    >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)
          {
            echo "body<<EOF_CHANGELOG"
            echo "## What's changed"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}" -- || true
            else
              git log --pretty=format:"- %s (%h)" "${TAG}" -- | head -30 || true
            fi
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.apk.outputs.tag }}
          name:       "AdAway ${{ steps.apk.outputs.tag }}"
          body:       ${{ steps.changelog.outputs.body }}
          draft:      false
          prerelease: ${{ contains(steps.apk.outputs.tag, '-') }}
          files:      ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
