name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/adaway-release.jks"
          echo "Keystore size: $(wc -c < "$HOME/adaway-release.jks") bytes"

      - name: Write Gradle signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          PROPS_FILE="$HOME/.gradle/gradle.properties"
          mkdir -p "$(dirname "$PROPS_FILE")"
          printf 'signingStoreLocation=%s/adaway-release.jks\n' "$HOME"   >> "$PROPS_FILE"
          printf 'signingStorePassword=%s\n' "$SIGNING_STORE_PASSWORD"    >> "$PROPS_FILE"
          printf 'signingKeyAlias=%s\n'      "$SIGNING_KEY_ALIAS"         >> "$PROPS_FILE"
          printf 'signingKeyPassword=%s\n'   "$SIGNING_KEY_PASSWORD"      >> "$PROPS_FILE"
          echo "Signing properties written:"
          grep "signing" "$PROPS_FILE" | sed 's/Password=.*/Password=***/'

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --stacktrace --info 2>&1 | grep -E "(BUILD|FAILED|error:|> Task|Found signature)" | tail -30

      - name: Find and rename APK
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "=== All build outputs ==="
          find app/build/outputs -type f 2>/dev/null || echo "(empty)"
          SRC=$(find app/build/outputs -name '*.apk' -not -path '*/intermediates/*' | head -n1)
          if [ -z "$SRC" ]; then
            echo "ERROR: no APK found"
            exit 1
          fi
          DEST="app/build/outputs/apk/release/AdAway-${TAG}.apk"
          mkdir -p "$(dirname "$DEST")"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"

      - name: Upload APK search log (diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-listing
          path: |
            app/build/outputs/mapping/
          retention-days: 3

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)
          {
            echo "body<<EOF_CHANGELOG"
            echo "## What's changed"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}" -- || true
            else
              git log --pretty=format:"- %s (%h)" "${TAG}" -- | head -30 || true
            fi
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.apk.outputs.tag }}
          name:       "AdAway ${{ steps.apk.outputs.tag }}"
          body:       ${{ steps.changelog.outputs.body }}
          draft:      false
          prerelease: ${{ contains(steps.apk.outputs.tag, '-') }}
          files:      ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
