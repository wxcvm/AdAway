name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/adaway-release.jks"
          echo "Keystore size: $(wc -c < "$HOME/adaway-release.jks") bytes"
          file "$HOME/adaway-release.jks"

      - name: Write Gradle signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          PROPS_FILE="$HOME/.gradle/gradle.properties"
          printf 'signingStoreLocation=%s/adaway-release.jks\n' "$HOME"   >> "$PROPS_FILE"
          printf 'signingStorePassword=%s\n' "$SIGNING_STORE_PASSWORD"    >> "$PROPS_FILE"
          printf 'signingKeyAlias=%s\n'      "$SIGNING_KEY_ALIAS"         >> "$PROPS_FILE"
          printf 'signingKeyPassword=%s\n'   "$SIGNING_KEY_PASSWORD"      >> "$PROPS_FILE"
          echo "=== Written signing properties (passwords masked) ==="
          grep "signing" "$PROPS_FILE" | sed 's/Password=.*/Password=***/'

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Locate APK
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "=== All APK outputs ==="
          find app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "(none)"
          echo "=== Full outputs tree ==="
          find app/build/outputs -type f 2>/dev/null || echo "(empty)"
          SRC=$(find app/build/outputs -name '*.apk' -not -path '*/intermediates/*' | head -n1)
          if [ -z "$SRC" ]; then echo "No APK found"; exit 1; fi
          DEST="AdAway-${TAG}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"    >> "$GITHUB_OUTPUT"
          echo "Packaged: $DEST ($(wc -c < "$DEST") bytes)"


      - name: Generate manifest.json for in-app update check
        id: manifest
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          VERSION="${TAG#v}"
          VCODE=$(grep "appCode" gradle/libs.versions.toml | grep -o "[0-9]*")
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/AdAway-${TAG}.apk"
          cat > manifest.json << MANIFEST
          {
            "version": "${VERSION}",
            "versionCode": ${VCODE},
            "apkUrl": "${APK_URL}",
            "changelog": "See https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          }
          MANIFEST
          echo "manifest_path=manifest.json" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.apk.outputs.tag }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n1)
          {
            echo "body<<EOF_CHANGELOG"
            echo "## What's changed"
            echo ""
            if [ -n "$PREV" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV}..${TAG}" -- || true
            else
              git log --pretty=format:"- %s (%h)" "${TAG}" -- | head -30 || true
            fi
            echo ""
            [ -n "$PREV" ] && echo "**Full diff:** https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.apk.outputs.tag }}
          name:       "AdAway ${{ steps.apk.outputs.tag }}"
          body:       ${{ steps.changelog.outputs.body }}
          draft:      false
          prerelease: ${{ contains(steps.apk.outputs.tag, '-') }}
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.manifest.outputs.manifest_path }}
          fail_on_unmatched_files: true
