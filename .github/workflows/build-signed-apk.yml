name: Build self-signed APK (manual)

# Manual-only: build a release-shaped APK signed with this fork's own
# persistent signing key (stored as repo secrets, never committed), and
# attach it as a workflow run artifact. This never creates a GitHub
# Release and never publishes anywhere - the APK only ever lives as a
# downloadable artifact on this run, for personal install/update.
#
# Because every run signs with the SAME key (unlike the previous
# version of this workflow, which generated a fresh throwaway key each
# time), APKs built here can be installed over a previous install of
# this same fork as an update, instead of requiring an uninstall first.
on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/adaway-release.jks"

      - name: Write signing config
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          {
            echo "signingStoreLocation=$HOME/adaway-release.jks"
            echo "signingStorePassword=$SIGNING_STORE_PASSWORD"
            echo "signingKeyAlias=$SIGNING_KEY_ALIAS"
            echo "signingKeyPassword=$SIGNING_KEY_PASSWORD"
          } >> "$HOME/.gradle/gradle.properties"

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify signing certificate and applicationId
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          echo "## APK verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "APK file: \`$(basename "$APK")\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Application ID" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          "$ANDROID_HOME/build-tools"/*/aapt2 dump badging "$APK" 2>/dev/null | grep "^package:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Signing certificate (from the built APK)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          "$ANDROID_HOME/build-tools"/*/apksigner verify --print-certs "$APK" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Expected certificate (from the repo's signing keystore secret)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          keytool -list -v -keystore "$HOME/adaway-release.jks" -storepass "$SIGNING_STORE_PASSWORD" 2>/dev/null | grep -A1 "SHA256:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdAway-signed
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

