name: Build APK (manual)

# Manual-only workflow. Builds a release APK signed with this fork's own
# persistent signing key (stored as encrypted repo secrets, never committed).
# Every run produces an APK signed with the SAME key, so each build can be
# installed as an update over a previous one from this workflow, without
# needing to uninstall first.
#
# Required repo secrets:
#   SIGNING_KEYSTORE_BASE64  – base64-encoded .jks keystore file
#   SIGNING_STORE_PASSWORD   – keystore password
#   SIGNING_KEY_ALIAS        – key alias inside the keystore
#   SIGNING_KEY_PASSWORD     – key password (same as store for PKCS12)
#
# The APK is attached as a workflow artifact (14-day retention).
# No GitHub Release is created; nothing is published anywhere.
on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/adaway-release.jks"

      - name: Write Gradle signing properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cat >> "$HOME/.gradle/gradle.properties" << PROPS
          signingStoreLocation=$HOME/adaway-release.jks
          signingStorePassword=$SIGNING_STORE_PASSWORD
          signingKeyAlias=$SIGNING_KEY_ALIAS
          signingKeyPassword=$SIGNING_KEY_PASSWORD
          PROPS

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify libwebserver_exec.so is the real binary, not the placeholder stub
        # BUG FIX: this repo ships libwebserver_exec.so as a renamed copy of
        # a plain executable, swapped in over a tiny placeholder stub.so by
        # a Gradle task (see webserver/build.gradle) whose wiring to the
        # native-lib packaging step previously depended on an internal AGP
        # class that silently matched zero tasks — so the placeholder stub
        # (~3.7KB) shipped in every release build for an unknown amount of
        # time with no build failure, no warning, nothing. The web server
        # obviously can never start if this happens again. Fail loudly here
        # instead of finding out from a user's bug report.
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          SIZE=$(unzip -l "$APK" | grep 'lib/arm64-v8a/libwebserver_exec.so' | awk '{print $1}')
          echo "libwebserver_exec.so size in APK: ${SIZE:-<not found>} bytes"
          [ -n "${SIZE:-}" ] || { echo "ERROR: libwebserver_exec.so not found in APK"; exit 1; }
          [ "$SIZE" -gt 51200 ] || { echo "ERROR: libwebserver_exec.so is only $SIZE bytes — this looks like the placeholder stub, not the real webserver binary. Check webserver/build.gradle's renameJniLibAsExecutable wiring."; exit 1; }
          echo "OK: binary size looks like a real build, not the stub."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdAway-signed
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Verify applicationId and signing certificate match keystore
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          BT=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n1)
          echo "Build-tools: $BT"
          echo "APK: $APK"

          # 1. Check applicationId
          echo ""
          echo "=== applicationId ==="
          "$BT/aapt2" dump badging "$APK" | grep "^package:" | tee /tmp/apk_pkg.txt
          grep -q 'com.wxcvm.Adaway' /tmp/apk_pkg.txt \
            && echo "OK: applicationId = com.wxcvm.Adaway" \
            || { echo "ERROR: wrong applicationId"; exit 1; }

          # 2. Extract APK signing certificate SHA-256
          echo ""
          echo "=== apksigner output (raw) ==="
          "$BT/apksigner" verify --print-certs "$APK" | tee /tmp/apksigner_out.txt

          # apksigner >= 0.9 says "Signer #1 certificate SHA-256 digest:"
          # older versions say "certificate SHA-256 digest:"
          APK_FP=$(grep -i "SHA-256 digest" /tmp/apksigner_out.txt | head -1 | awk '{print tolower($NF)}' | tr -d ':')
          echo ""
          echo "APK signing cert SHA-256: '$APK_FP'"
          [ -n "$APK_FP" ] || { echo "ERROR: could not extract APK cert fingerprint"; exit 1; }

          # 3. Extract keystore certificate SHA-256
          echo ""
          echo "=== keytool output (raw) ==="
          keytool -list -v \
            -keystore "$HOME/adaway-release.jks" \
            -storepass "$SIGNING_STORE_PASSWORD" 2>&1 | tee /tmp/keytool_out.txt

          KS_FP=$(grep "SHA256:" /tmp/keytool_out.txt | head -1 | sed 's/.*SHA256: //' | tr -d ':' | tr 'A-F' 'a-f')
          echo ""
          echo "Keystore cert SHA-256: '$KS_FP'"
          [ -n "$KS_FP" ] || { echo "ERROR: could not extract keystore cert fingerprint"; exit 1; }

          # 4. Compare
          echo ""
          [ "$APK_FP" = "$KS_FP" ] \
            && echo "OK: fingerprints match — APK is signed with the persistent fork key" \
            || { echo "MISMATCH: APK signed with wrong key!"; exit 1; }

