name: AI Auto Fix

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for AI'
        required: true
        default: 'fix bugs and create PR'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: AI analyze and fix
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os, subprocess, re

          api_key = re.sub(r'\s+', '', os.environ['DEEPSEEK_KEY'])
          task = os.environ['TASK']

          files = subprocess.run(
              ['find', '.', '-type', 'f',
               '!', '-path', './.git/*',
               '!', '-path', './.github/*',
               '!', '-name', '*.db',
               '!', '-name', '*.pyc'],
              capture_output=True, text=True
          ).stdout[:4000]

          resp = requests.post(
              "https://api.deepseek.com/v1/chat/completions",
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              },
              json={
                  "model": "deepseek-chat",
                  "messages": [
                      {"role": "system", "content": "You are a coding AI. Output changes with ---FILE:path--- then code block. Then generate a bash script wrapped in ```bash."},
                      {"role": "user", "content": f"Task: {task}\n\nFiles:\n{files}"}
                  ]
              }
          )

          data = resp.json()
          if 'choices' not in data:
              print(f"API Error: {json.dumps(data)}")
              exit(1)

          content = data['choices'][0]['message']['content']
          print(content)

          # 提取 ---FILE:xxx--- 块
          blocks = re.findall(r'---FILE:(.*?)---\s*\n(.*?)(?=---FILE:|---$)', content, re.DOTALL)
          if blocks:
              for fp, c in blocks:
                  fp = fp.strip()
                  m = re.search(r'```(?:\w+)?\n(.*?)```', c, re.DOTALL)
                  if m:
                      c = m.group(1)
                  os.makedirs(os.path.dirname(fp) or '.', exist_ok=True)
                  with open(fp, 'w') as f:
                      f.write(c)
                  print(f"Wrote: {fp}")

          # 提取 bash 脚本
          m = re.search(r'```bash\n(.*?)```', content, re.DOTALL)
          if m:
              with open('/tmp/fix.sh', 'w') as f:
                  f.write(m.group(1))
              subprocess.run(['bash', '/tmp/fix.sh'])
              print("Shell script done")
          PYEOF

      - name: Git commit and push
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@ai.com"

          # 删临时文件，只留代码改动
          rm -f ai_output.md fix.sh /tmp/ai_out.md

          # 检查有没有真正的代码改动
          git add -A
          if git diff --cached --quiet; then
            echo "No real code changes"
            echo "NO_CHANGE=true" >> $GITHUB_ENV
            exit 0
          fi

          BRANCH="ai-fix-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "AI: ${{ github.event.inputs.task }}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        if: env.NO_CHANGE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "AI: ${{ github.event.inputs.task }}" \
            --body "Auto-generated by AI. Task: ${{ github.event.inputs.task }}" \
            --head "$BRANCH" \
            --base main
          echo "PR created!"

      - name: Tag
        if: env.NO_CHANGE != 'true'
        run: |
          TAG="ai-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"          git checkout -b "$BRANCH"
          git add .
          if git diff --staged --quiet; then
            echo "NO_CHANGE=true" >> $GITHUB_ENV
            echo "No changes"
          else
            git commit -m "AI: ${{ github.event.inputs.task }}"
            git push origin "$BRANCH"
            echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          fi

      - name: Create PR
        if: env.NO_CHANGE != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "AI: ${{ github.event.inputs.task }}" \
            --body "Auto-generated by AI" \
            --head "$BRANCH" \
            --base main
          echo "PR created!"

      - name: Tag
        if: env.NO_CHANGE != 'true'
        run: |
          TAG="ai-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
